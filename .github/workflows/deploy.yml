name: Deploy Backend to AWS Lambda

on:
  push:
    branches:
      - add-backend
      - main
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: "124661688886"
  ECR_REPOSITORY: yom-backend
  LAMBDA_FUNCTION_NAME: yom-backend
  S3_BUCKET: yom-word2vec-assets-124661688886-eu-central-1-an

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        run: echo "IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download assets from S3
        run: |
          mkdir -p models artifacts data

          aws s3 cp s3://${S3_BUCKET}/models/ models/ --recursive
          aws s3 cp s3://${S3_BUCKET}/artifacts/ artifacts/ --recursive
          aws s3 cp s3://${S3_BUCKET}/data/ data/ --recursive

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            -f backend/Dockerfile \
            -t $IMAGE_URI \
            --push \
            .

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION_NAME \
            --image-uri $IMAGE_URI